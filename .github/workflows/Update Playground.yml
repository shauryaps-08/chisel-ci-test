name: Update playground submodule
on:
  schedule:
    - cron: '0 6 * * *'   # daily at 6am UTC
  workflow_dispatch:        # allow manual trigger too

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update playground to latest
        run: |
          git submodule update --remote playground

      - name: Create PR if anything changed
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore: update playground submodule"
          commit-message: "Update playground submodule to latest upstream commit"
          branch: update-playground-submodule
          base: main
          body: |
            Automated update of the `playground` submodule pointer to the latest
            upstream commit. This PR is gated by the normal CI workflow
            (`make check` / `make lint`) before it can be merged, so a breaking
            upstream change will fail here rather than reaching `main`.
