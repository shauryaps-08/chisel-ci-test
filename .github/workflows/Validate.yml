name: Validate Workflows
# Deliberately self-contained -- does NOT call reusable-ci.yml@main, since
# this is the file responsible for catching mistakes in the other workflow
# files. It can't depend on them being correct first.

on:
  pull_request:
    paths:
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download actionlint
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Run actionlint on all workflow files
        run: ./actionlint -color
