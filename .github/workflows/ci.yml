name: CI
on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ci:
    # @main pins this to ALWAYS read reusable-ci.yml from the main branch,
    # regardless of which branch this caller file itself lives on/runs on.
    # This is what makes "update CI logic once on main, every branch picks
    # it up automatically" actually work -- the branch only needs this thin
    # trigger file, which rarely if ever needs to change.
    uses: shauryaps-08/chisel-ci-test/.github/workflows/reusable-ci.yml@main
    secrets: inherit
