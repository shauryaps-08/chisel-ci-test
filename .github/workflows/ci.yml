name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: morphingmachines/playground
          path: playground
          submodules: false

      - name: Fix SSH URLs and fetch submodules
        working-directory: playground
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          sed -i 's|git@github.com:|https://github.com/|g' .gitmodules
          git submodule sync
          git submodule update --init --depth=1 -- \
            dependencies/rocket-chip \
            dependencies/rocket-chip-blocks \
            dependencies/rocket-chip-fpga-shells \
            dependencies/rocket-chip-inclusive-cache \
            dependencies/testchipip
          find . -name ".gitmodules" -exec sed -i 's|git@github.com:|https://github.com/|g' {} \;
          git submodule foreach git submodule sync
          git submodule foreach git submodule update --init --depth=1

      - uses: actions/checkout@v4
        with:
          path: myproject

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install firtool
        run: |
          wget https://github.com/llvm/circt/releases/download/firtool-1.62.1/circt-full-shared-linux-x64.tar.gz
          tar -xzf circt-full-shared-linux-x64.tar.gz
          ls -la
          echo "$GITHUB_WORKSPACE/circt-full-shared-linux-x64/bin" >> $GITHUB_PATH

      - name: Verify firtool
        run: firtool --version

      - name: Run tests
        working-directory: myproject
        run: make check

      - name: Generate RTL
        working-directory: myproject
        run: make rtl
