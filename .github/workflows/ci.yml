name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: morphingmachines/playground
          path: playground
          submodules: false

      - name: Fix SSH URLs and fetch submodules
        working-directory: playground
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          sed -i 's|git@github.com:|https://github.com/|g' .gitmodules
          git submodule sync
          git submodule update --init --depth=1 dependencies/cde
          git submodule update --init --depth=1 dependencies/diplomacy
          git submodule update --init --depth=1 dependencies/berkeley-hardfloat
          git submodule update --init --depth=1 dependencies/rocket-chip
          git submodule update --init --depth=1 dependencies/emitrtl
          git submodule update --init --depth=1 dependencies/chipyard

      - uses: actions/checkout@v4
        with:
          path: myproject

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Mill dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            ~/.ivy2/cache
            ~/.cache/coursier
          key: ${{ runner.os }}-mill-${{ hashFiles('myproject/build.sc') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Install Mill
        run: |
          curl -L https://raw.githubusercontent.com/lefou/millw/0.4.11/millw > mill
          chmod +x mill
          sudo mv mill /usr/local/bin/mill
          echo "0.11.6" > playground/.mill-version
          echo "0.11.6" > myproject/.mill-version

      - name: Cache firtool
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/firtool
          key: firtool-1.62.1

      - name: Install firtool
        run: |
          if ! command -v firtool &> /dev/null; then
            wget -q https://github.com/llvm/circt/releases/download/firtool-1.62.1/firrtl-bin-linux-x64.tar.gz
            tar -xzf firrtl-bin-linux-x64.tar.gz
            sudo mv firtool-1.62.1/bin/firtool /usr/local/bin/firtool
            sudo chmod +x /usr/local/bin/firtool
          fi
          firtool --version

      - name: Compile all sources
        working-directory: myproject
        env:
          JAVA_OPTS: "-Xmx4g -Xss8m"
        run: mill myproject.compile

      - name: Run tests
        working-directory: myproject
        env:
          JAVA_OPTS: "-Xmx4g -Xss8m"
        run: mill myproject.test

      - name: Generate RTL
        working-directory: myproject
        env:
          JAVA_OPTS: "-Xmx4g -Xss8m"
        run: make rtl

      - name: Install Verilator
        run: sudo apt-get install -y verilator

      - name: Lint RTL
        working-directory: myproject
        run: |
          find generated_sv_dir -name "*.sv" | while read f; do
            echo "Linting $f"
            verilator --lint-only --language 1800-2012 "$f" || exit 1
          done

      - name: Upload generated RTL
        uses: actions/upload-artifact@v4
        with:
          name: generated-rtl
          path: myproject/generated_sv_dir/
          if-no-files-found: warn

      - name: Report
        if: always()
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- RTL artifact: generated-rtl" >> $GITHUB_STEP_SUMMARY
