name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout playground
        uses: actions/checkout@v4
        with:
          repository: morphingmachines/playground
          path: playground
          submodules: false

      - name: Fix SSH URLs and init only needed submodules
        working-directory: playground
        run: |
          sed -i 's|git@github.com:|https://github.com/|g' .gitmodules
          git submodule sync
          git submodule update --init dependencies/cde
          git submodule update --init dependencies/diplomacy
          git submodule update --init dependencies/berkeley-hardfloat
          git submodule update --init dependencies/rocket-chip
          git submodule update --init dependencies/emitrtl

      - name: Fix rocket-chip submodules
        working-directory: playground/dependencies/rocket-chip
        run: |
          sed -i 's|git@github.com:|https://github.com/|g' .gitmodules
          git submodule sync
          git submodule update --init --recursive

      - name: Checkout myproject
        uses: actions/checkout@v4
        with:
          path: myproject

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Mill
        run: |
          curl -L https://raw.githubusercontent.com/lefou/millw/0.4.11/millw > mill
          chmod +x mill
          sudo mv mill /usr/local/bin/mill
          echo "0.11.6" > playground/.mill-version

      - name: Install firtool
        run: |
          wget https://github.com/llvm/circt/releases/download/firtool-1.62.1/circt-full-shared-linux-x64.tar.gz
          tar -xzf circt-full-shared-linux-x64.tar.gz
          sudo cp circt-full-shared-linux-x64/bin/firtool /usr/local/bin/
          firtool --version

      - name: Run tests
        working-directory: myproject
        run: make check
