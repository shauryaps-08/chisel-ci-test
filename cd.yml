      #     aws ssm send-command \
      #       --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
      #       --document-name "AWS-RunShellScript" \
      #       --parameters commands='[
      #         "mkdir -p /opt/myproject/latest_artifacts",
      #         "curl -L -o /tmp/latest.tar.gz https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag_name }}/generated-rtl-${{ steps.tag.outputs.tag_name }}.tar.gz",
